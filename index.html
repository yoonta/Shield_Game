<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Game</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            background: #121217;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        canvas { display: block; border-radius: 8px; }

        /* --- Minimalist UI --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0c;
            z-index: 10;
        }

        #main-menu, #ranking-screen {
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 10px;
            margin-bottom: 40px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px;
            text-align: center;
            outline: none;
            margin-bottom: 40px;
            width: 220px;
            letter-spacing: 2px;
        }

        input:focus { border-bottom-color: #00f2fe; }

        .btn-group { display: flex; gap: 15px; justify-content: center; }

        button {
            padding: 12px 30px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #fff;
            background: transparent;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #fff; color: #000; border-color: #fff; }

        /* --- Ranking Style --- */
        #ranking-list {
            list-style: none;
            padding: 0;
            margin: 20px auto 40px;
            width: 250px;
        }

        #ranking-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #888;
        }

        #score-display {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 0.8rem; letter-spacing: 1px; color: #555;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">
            PLAYER: <span id="cur-name" style="color:#00f2fe">--</span> | 
            SCORE: <span id="cur-score" style="color:#fff">0</span>
        </div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <div id="ui-layer">
            <!-- Main Menu -->
            <div id="main-menu">
                <h1 id="menu-title">SHIELD GAME</h1>
                <input type="text" id="name-input" placeholder="NAME" maxlength="10" autocomplete="off">
                <div class="btn-group">
                    <button onclick="startGame()">START</button>
                    <button onclick="showRankings()">RANKING</button>
                </div>
            </div>

            <!-- Ranking Screen -->
            <div id="ranking-screen" style="display: none;">
                <h1>TOP 10</h1>
                <ul id="ranking-list"></ul>
                <button onclick="backToMenu()">BACK</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const mainMenu = document.getElementById('main-menu');
        const rankingScreen = document.getElementById('ranking-screen');
        const nameInput = document.getElementById('name-input');
        
        let playerName = "";
        let score = 0;
        let isGameOver = true;
        let shieldDir = 'W';
        let attacks = [];
        let frameCount = 0;
        let animationId;

        const center = { x: 250, y: 250 };

        // Controls
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            const key = e.key.toUpperCase();
            if (['W','A','S','D'].includes(key)) shieldDir = key;
            if (e.key === 'ArrowUp') shieldDir = 'W';
            if (e.key === 'ArrowDown') shieldDir = 'S';
            if (e.key === 'ArrowLeft') shieldDir = 'A';
            if (e.key === 'ArrowRight') shieldDir = 'D';
        });

        // --- Server Functions ---
        async function saveScore(name, score) {
            try {
                await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, score: score })
                });
            } catch (err) { console.error("Server save failed", err); }

            // Local backup
            let local = JSON.parse(localStorage.getItem('shieldLocal') || "[]");
            local.push({ name: name.toUpperCase(), score: score });
            local.sort((a,b) => b.score - a.score);
            localStorage.setItem('shieldLocal', JSON.stringify(local.slice(0, 10)));
        }

        async function showRankings() {
            mainMenu.style.display = 'none';
            rankingScreen.style.display = 'block';
            const list = document.getElementById('ranking-list');
            list.innerHTML = "LOADING...";

            try {
                const response = await fetch('/ranks');
                const ranks = await response.json();
                list.innerHTML = ranks.map(r => `<li><span>${r.name}</span><span>${r.score}</span></li>`).join('') || "NO DATA";
            } catch (err) {
                // Fallback to local data
                const local = JSON.parse(localStorage.getItem('shieldLocal') || "[]");
                list.innerHTML = local.map(r => `<li><span>${r.name} (Local)</span><span>${r.score}</span></li>`).join('') || "OFFLINE";
            }
        }

        // --- Game Logic ---
        function startGame() {
            const val = nameInput.value.trim();
            if (!val) { alert("ENTER NAME"); return; }
            playerName = val;
            document.getElementById('cur-name').innerText = playerName.toUpperCase();
            
            score = 0;
            attacks = [];
            isGameOver = false;
            uiLayer.style.display = 'none';
            update();
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            saveScore(playerName, score);
            
            uiLayer.style.display = 'flex';
            mainMenu.style.display = 'block';
            rankingScreen.style.display = 'none';
            document.getElementById('menu-title').innerText = "FAILED";
            nameInput.style.display = 'none';
            document.querySelector('.btn-group button').innerText = "RETRY";
        }

        function backToMenu() {
            rankingScreen.style.display = 'none';
            mainMenu.style.display = 'block';
        }

        function update() {
            if (isGameOver) return;
            ctx.fillStyle = 'rgba(10, 10, 12, 0.4)';
            ctx.fillRect(0, 0, 500, 500);

            // Draw Center Player
            ctx.beginPath(); ctx.arc(center.x, center.y, 20, 0, Math.PI*2);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

            // Draw Shield
            let ang = shieldDir==='D'?0 : shieldDir==='S'?Math.PI*0.5 : shieldDir==='A'?Math.PI : Math.PI*1.5;
            ctx.beginPath(); ctx.arc(center.x, center.y, 35, ang-0.75, ang+0.75);
            ctx.strokeStyle = '#00f2fe'; ctx.lineWidth = 6; ctx.stroke();

            // Attack Logic
            if (++frameCount % Math.max(15, 60 - Math.floor(score * 1.5)) === 0) {
                const dirs = ['W','A','S','D'];
                const o = dirs[Math.floor(Math.random()*4)];
                const s = 2.5 * (1 + score*0.05);
                attacks.push({
                    x: o==='A'?0 : o==='D'?500 : 250,
                    y: o==='W'?0 : o==='S'?500 : 250,
                    dx: o==='A'?s : o==='D'?-s : 0,
                    dy: o==='W'?s : o==='S'?-s : 0,
                    origin: o
                });
            }

            for (let i = attacks.length - 1; i >= 0; i--) {
                let a = attacks[i];
                a.x += a.dx; a.y += a.dy;
                let d = Math.hypot(250 - a.x, 250 - a.y);

                if (d <= 45) {
                    if (a.origin === shieldDir) {
                        attacks.splice(i, 1);
                        score++;
                        document.getElementById('cur-score').innerText = score;
                    } else if (d <= 25) {
                        gameOver();
                    }
                }
                ctx.fillStyle = '#ff4b2b';
                ctx.fillRect(a.x-4, a.y-4, 8, 8);
            }
            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>
