<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Game</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            background: #121217;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        canvas { display: block; border-radius: 4px; }

        /* --- Minimalist UI Layer --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0c;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 12px;
            margin-bottom: 40px;
            text-align: center;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px;
            text-align: center;
            outline: none;
            margin-bottom: 30px;
            width: 220px;
            letter-spacing: 2px;
        }

        input:focus { border-bottom-color: #00f2fe; }

        .btn-group { display: flex; gap: 15px; }

        button {
            padding: 10px 25px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #fff;
            background: transparent;
            border: 1px solid #333;
            border-radius: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { border-color: #fff; background: #fff; color: #000; }

        /* --- Rankings View --- */
        #ranking-screen {
            display: none;
            width: 100%;
            text-align: center;
        }

        #ranking-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            font-size: 0.9rem;
            color: #888;
            max-height: 200px;
            overflow-y: auto;
        }

        #ranking-list li {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            width: 200px;
            margin: 10px auto;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 5px;
        }

        #score-display {
            position: absolute;
            top: 20px; left: 20px;
            font-size: 0.9rem; color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">PLAYER: <span id="cur-name" style="color:#00f2fe">--</span> | SCORE: <span id="cur-score" style="color:#fff">0</span></div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <div id="ui-layer">
            <div id="main-menu">
                <h1>SHIELD GAME</h1>
                <input type="text" id="name-input" placeholder="NAME" maxlength="10">
                <div class="btn-group">
                    <button onclick="startGame()">START</button>
                    <button onclick="showRankings()">RANKING</button>
                </div>
            </div>

            <div id="ranking-screen">
                <h1>TOP PLAYERS</h1>
                <ul id="ranking-list"></ul>
                <button onclick="backToMenu()">BACK</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const mainMenu = document.getElementById('main-menu');
        const rankingScreen = document.getElementById('ranking-screen');
        const nameInput = document.getElementById('name-input');
        
        let playerName = "";
        let score = 0;
        let isGameOver = true;
        let shieldDir = 'W';
        let attacks = [];
        let frameCount = 0;
        let animationId;

        const center = { x: 250, y: 250 };

        // --- Controls ---
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            const key = e.key.toUpperCase();
            if (['W','A','S','D'].includes(key)) shieldDir = key;
            if (e.key.includes('Arrow')) shieldDir = e.key.replace('Arrow','')[0].replace('U','W').replace('D','S').replace('L','A').replace('R','D');
        });

        // --- Core Functions ---
        function startGame() {
            const val = nameInput.value.trim();
            if (!val) { alert("ENTER NAME"); return; }
            playerName = val;
            document.getElementById('cur-name').innerText = playerName.toUpperCase();
            
            score = 0;
            attacks = [];
            isGameOver = false;
            uiLayer.style.display = 'none';
            update();
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            saveScore(playerName, score);
            
            uiLayer.style.display = 'flex';
            mainMenu.style.display = 'block';
            rankingScreen.style.display = 'none';
            document.querySelector('h1').innerText = "FAILED";
            document.getElementById('name-input').style.display = 'none';
            document.querySelector('.btn-group button').innerText = "RETRY";
        }

        // --- Ranking Logic (LocalStorage) ---
        function saveScore(name, score) {
            let ranks = JSON.parse(localStorage.getItem('shieldRanks') || "[]");
            ranks.push({ name: name.toUpperCase(), score: score });
            ranks.sort((a, b) => b.score - a.score);
            ranks = ranks.slice(0, 10); // Keep top 10
            localStorage.setItem('shieldRanks', JSON.stringify(ranks));
        }

        function showRankings() {
            mainMenu.style.display = 'none';
            rankingScreen.style.display = 'block';
            const list = document.getElementById('ranking-list');
            const ranks = JSON.parse(localStorage.getItem('shieldRanks') || "[]");
            list.innerHTML = ranks.map(r => `<li><span>${r.name}</span><span>${r.score}</span></li>`).join('') || "NO DATA";
        }

        function backToMenu() {
            rankingScreen.style.display = 'none';
            mainMenu.style.display = 'block';
        }

        // --- Game Loop ---
        function update() {
            if (isGameOver) return;
            ctx.fillStyle = 'rgba(10, 10, 12, 0.4)';
            ctx.fillRect(0, 0, 500, 500);

            // Draw Player
            ctx.beginPath(); ctx.arc(center.x, center.y, 20, 0, Math.PI*2);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

            // Shield
            let ang = shieldDir==='D'?0 : shieldDir==='S'?Math.PI*0.5 : shieldDir==='A'?Math.PI : Math.PI*1.5;
            ctx.beginPath(); ctx.arc(center.x, center.y, 35, ang-0.75, ang+0.75);
            ctx.strokeStyle = '#00f2fe'; ctx.lineWidth = 6; ctx.stroke();

            // Attacks
            if (++frameCount % Math.max(15, 60 - Math.floor(score * 1.5)) === 0) {
                const dirs = ['W','A','S','D'];
                const o = dirs[Math.floor(Math.random()*4)];
                const s = 2.5 * (1 + score*0.05);
                attacks.push({
                    x: o==='A'?0 : o==='D'?500 : 250,
                    y: o==='W'?0 : o==='S'?500 : 250,
                    dx: o==='A'?s : o==='D'?-s : 0,
                    dy: o==='W'?s : o==='S'?-s : 0,
                    origin: o
                });
            }

            for (let i = attacks.length - 1; i >= 0; i--) {
                let a = attacks[i];
                a.x += a.dx; a.y += a.dy;
                let d = Math.hypot(250 - a.x, 250 - a.y);

                if (d <= 45) {
                    if (a.origin === shieldDir) {
                        attacks.splice(i, 1);
                        score++;
                        document.getElementById('cur-score').innerText = score;
                    } else if (d <= 25) {
                        gameOver();
                    }
                }
                ctx.fillStyle = '#ff4b2b'; ctx.fillRect(a.x-4, a.y-4, 8, 8);
            }
            animationId = requestAnimationFrame(update);
        }
    </script>
</body>
</html>
